name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"
          pip install seaborn

      - name: Lint with Ruff
        run: ruff check src/ tests/ --ignore E501

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=aquasense --cov-report=term-missing \
                 --cov-report=xml --cov-fail-under=40

  dashboard-smoke:
    name: Dashboard smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e .
          pip install seaborn

      - name: Run pipeline (headless, small dataset)
        run: |
          python -m aquasense.pipeline --nodes 20 --timesteps 20 --seed 1
        env:
          MPLBACKEND: Agg
