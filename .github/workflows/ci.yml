name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main}

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev,torch]"
          pip install seaborn

      - name: Run tests with coverage
        env:
          MPLBACKEND: Agg
        run: |
          pytest tests/ -v --cov=aquasense --cov-report=term-missing \
                 --cov-report=xml --cov-fail-under=40

  smoke:
    name: Full pipeline smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e . seaborn

      - name: Core pipeline
        run: python -m aquasense.pipeline --nodes 20 --timesteps 20 --seed 1
        env:
          MPLBACKEND: Agg

      - name: Benchmarks
        run: python -m aquasense.pipeline --nodes 20 --timesteps 20 --bench --no-dashboard
        env:
          MPLBACKEND: Agg

      - name: Phase 1 (synthetic ARGO + LSTM)
        run: python -m aquasense.pipeline --nodes 30 --timesteps 25 --phase1 --no-dashboard
        env:
          MPLBACKEND: Agg
